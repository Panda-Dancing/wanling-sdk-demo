<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanling Avatar SDK - 接入示例</title>
  <!-- 
    页面说明：
    这是 SDK 接入示例的入口 HTML 文件
    - 引入 Vue 3 应用的主入口 main.js
    - 设置 viewport 确保移动端适配
  -->
  <style>
    /* 全局样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body, #app {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a1628;
    }
  </style>
</head>
<body>
  <!-- Vue 应用挂载点 -->
  <div id="app"></div>
  
  <!-- 
    引入主入口文件
    type="module" 表示使用 ES Module 方式加载
  -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
